<!-- @dsCard group="Spacing" viewport="700x150" name="Radii · 圆角" subtitle="10 / 16 / 22 · squircle 18 · pill" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--card);padding:24px 26px;font-family:var(--font-ui);}
  .row{display:flex;gap:20px;align-items:center;}
  .u{text-align:center;}
  .box{width:64px;height:64px;background:var(--blue-wash);box-shadow:inset 0 0 0 2px var(--blue);}
  .n{font-weight:600;font-size:12px;color:var(--ink);margin-top:10px;}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);margin-top:2px;}
  .pill{width:96px;height:44px;border-radius:999px;background:var(--blue-wash);box-shadow:inset 0 0 0 2px var(--blue);}
</style></head><body>
  <div class="row">
    <div class="u"><div class="box" style="border-radius:10px"></div><div class="n">sm</div><div class="v">10px</div></div>
    <div class="u"><div class="box" style="border-radius:16px"></div><div class="n">md</div><div class="v">16px</div></div>
    <div class="u"><div class="box" style="border-radius:22px"></div><div class="n">lg</div><div class="v">22px</div></div>
    <div class="u"><div class="box" style="border-radius:18px"></div><div class="n">icon</div><div class="v">18px squircle</div></div>
    <div class="u"><div class="pill"></div><div class="n">pill</div><div class="v">999px</div></div>
  </div>
</body></html>
