<!-- @dsCard group="Colors" viewport="700x180" name="Dark theme · 夜" subtitle="Brightened axis on near-black; data-theme=&quot;dark&quot;" -->
<!DOCTYPE html><html lang="zh" data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ground);padding:22px 24px;font-family:var(--font-ui);}
  .card{background:var(--card);border-radius:var(--r-md);box-shadow:var(--shadow-card);padding:18px 20px;}
  .row{display:flex;gap:12px;margin-top:0;}
  .sw{flex:1;}
  .chip{height:48px;border-radius:var(--r-sm);box-shadow:var(--edge);}
  .hx{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);margin-top:7px;}
  .nm{font-weight:600;font-size:12px;color:var(--ink);margin-top:4px;}
  .t{font-weight:600;font-size:13px;color:var(--ink);margin-bottom:13px;}
  .t small{font-weight:450;color:var(--ink-2);}
</style></head><body>
  <div class="card">
    <div class="t">夜 · Dark surfaces <small>ground #16151C · card #1E1C26 · ink #F4F2EC</small></div>
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--red)"></div><div class="nm">红</div><div class="hx">#FF5A4D</div></div>
      <div class="sw"><div class="chip" style="background:var(--blueink)"></div><div class="nm">墨蓝</div><div class="hx">#4D8DF0</div></div>
      <div class="sw"><div class="chip" style="background:var(--yellow)"></div><div class="nm">黄</div><div class="hx">#FFD84D</div></div>
      <div class="sw"><div class="chip" style="background:var(--jade)"></div><div class="nm">翠</div><div class="hx">#34D6A0</div></div>
      <div class="sw"><div class="chip" style="background:var(--blue)"></div><div class="nm">钴蓝</div><div class="hx">#5AA2FF</div></div>
    </div>
  </div>
</body></html>
