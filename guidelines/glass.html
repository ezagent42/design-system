<!-- @dsCard group="Effects" viewport="700x180" name="Frosted glass · 毛玻璃" subtitle="Controls float over color blobs — backdrop-blur(13px)" -->
<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--card);padding:22px 24px;font-family:var(--font-ui);}
  .stage{position:relative;border-radius:var(--r-md);overflow:hidden;padding:26px 22px;background:#14131C;display:flex;align-items:center;gap:14px;box-shadow:var(--edge);}
  .blob{position:absolute;border-radius:999px;filter:blur(3px);pointer-events:none;}
  .z{position:relative;z-index:2;}
  .seg{display:inline-flex;background:rgba(255,255,255,.15);backdrop-filter:blur(13px) saturate(1.3);-webkit-backdrop-filter:blur(13px) saturate(1.3);border-radius:999px;padding:4px;gap:2px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.32);}
  .seg b{font-weight:600;font-size:13px;padding:8px 16px;border-radius:999px;color:rgba(255,255,255,.72);}
  .seg b.on{background:rgba(255,255,255,.92);color:#1A1A22;}
  .btn{background:rgba(255,255,255,.15);backdrop-filter:blur(13px) saturate(1.3);-webkit-backdrop-filter:blur(13px) saturate(1.3);color:#fff;border:0;border-radius:999px;padding:11px 20px;font-family:var(--font-ui);font-weight:600;font-size:14px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.32);}
  .chip{margin-left:auto;backdrop-filter:blur(9px) saturate(1.25);-webkit-backdrop-filter:blur(9px) saturate(1.25);background:rgba(255,255,255,.5);box-shadow:inset 0 0 0 1px rgba(255,255,255,.62);border-radius:11px;padding:9px 13px;font-family:var(--font-mono);font-size:11px;color:#16161C;font-weight:600;}
</style></head><body>
  <div class="stage">
    <span class="blob" style="width:120px;height:120px;background:var(--red);left:-24px;top:-34px;"></span>
    <span class="blob" style="width:96px;height:96px;background:var(--yellow);left:160px;bottom:-44px;"></span>
    <span class="blob" style="width:110px;height:110px;background:var(--blueink);left:46%;top:-40px;"></span>
    <span class="blob" style="width:84px;height:84px;background:var(--jade);right:130px;bottom:-30px;"></span>
    <span class="seg z"><b class="on">设计</b><b>开发</b><b>预览</b></span>
    <button class="btn z">筛选 Filter</button>
    <span class="chip z">backdrop-blur(13px)</span>
  </div>
</body></html>
