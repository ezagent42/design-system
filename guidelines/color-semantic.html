<!-- @dsCard group="Colors" viewport="700x150" name="Semantic tints · 语义底色" subtitle="Soft wash + deep text pairs for status & badges" -->
<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--card);padding:24px 26px;font-family:var(--font-ui);}
  .row{display:flex;gap:14px;}
  .pill{flex:1;border-radius:var(--r-sm);padding:14px 16px;}
  .pill .h{font-weight:700;font-size:14px;}
  .pill .s{font-family:var(--font-mono);font-size:10px;margin-top:5px;opacity:.8;}
  .b-blue{background:var(--blue-wash);color:var(--blue-deep);}
  .b-jade{background:var(--jade-wash);color:var(--jade-deep);}
  .b-red{background:var(--red-wash);color:var(--red-deep);}
  .b-orange{background:var(--orange-wash);color:#9A5410;}
</style></head><body>
  <div class="row">
    <div class="pill b-blue"><div class="h">Info · 信息</div><div class="s">wash E7EEFF · text 0040C4</div></div>
    <div class="pill b-jade"><div class="h">Success · 成功</div><div class="s">wash DCF1E8 · text 0A7A52</div></div>
    <div class="pill b-red"><div class="h">Danger · 警示</div><div class="s">wash FAE0E3 · text B01228</div></div>
    <div class="pill b-orange"><div class="h">Warning · 注意</div><div class="s">wash FFEBD6 · text 9A5410</div></div>
  </div>
</body></html>
