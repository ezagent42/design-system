<!-- @dsCard group="Brand" viewport="700x200" name="Logo · dark mode" subtitle="Brightened axis on near-black — ezagent-logo-dark.png" -->
<!DOCTYPE html><html lang="zh" data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ground);padding:24px 28px;font-family:var(--font-ui);}
  .stage{background:#14131C;border-radius:var(--r-lg);box-shadow:var(--shadow-card);padding:30px 34px;display:flex;gap:28px;align-items:center;}
  .markwrap{display:inline-flex;align-items:center;gap:16px;}
  .mark{height:78px;width:auto;display:block;}
  .wd{font-family:var(--font-ui);font-weight:800;font-size:24px;letter-spacing:-.02em;color:#F4F2EC;}
  .wd small{display:block;font-family:var(--font-cn-ui);font-weight:400;font-size:13px;color:rgba(244,242,236,.55);margin-top:3px;}
  .rule{width:1px;align-self:stretch;background:rgba(244,242,236,.14);}
  .meta{font-family:var(--font-mono);font-size:11px;color:rgba(244,242,236,.55);line-height:1.9;}
</style></head><body>
  <div class="stage">
    <div class="markwrap">
      <img class="mark" src="../assets/ezagent-logo-dark.png" alt="Ezagent">
      <span class="wd">EZAGENT<small>Organization IDE · dark</small></span>
    </div>
    <div class="rule"></div>
    <div class="meta">transparent PNG<br>brightened red·blue·yellow<br>white channels glow on near-black</div>
  </div>
</body></html>
