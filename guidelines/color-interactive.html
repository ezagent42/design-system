<!-- @dsCard group="Colors" viewport="700x158" name="Interactive · 交互色" subtitle="Cobalt blue is the action color; warm orange accents" -->
<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--card);padding:24px 26px;font-family:var(--font-ui);}
  .row{display:flex;gap:14px;}
  .sw{flex:1;}
  .chip{height:70px;border-radius:var(--r-md);box-shadow:var(--edge);display:flex;align-items:flex-end;padding:9px 11px;}
  .chip.wash{box-shadow:var(--edge);}
  .tag{font-family:var(--font-mono);font-size:10px;color:#fff;background:rgba(0,0,0,.22);padding:3px 7px;border-radius:6px;letter-spacing:.03em;}
  .nm{font-weight:600;font-size:14px;color:var(--ink);margin-top:11px;}
  .nm small{font-weight:450;color:var(--ink-3);}
  .hx{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);margin-top:2px;}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--blue)"><span class="tag">ACTION</span></div><div class="nm">钴蓝 <small>Cobalt · primary</small></div><div class="hx">#0B5CFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-wash)"></div><div class="nm">蓝 Wash <small>tint surface</small></div><div class="hx">#E7EEFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--orange)"><span class="tag">ACCENT</span></div><div class="nm">暖橙 <small>Orange</small></div><div class="hx">#FF8A1E</div></div>
    <div class="sw"><div class="chip" style="background:var(--orange-wash)"></div><div class="nm">橙 Wash</div><div class="hx">#FFEBD6</div></div>
  </div>
</body></html>
