<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale · 4px rhythm" subtitle="--space-1 … --space-12 on a 4px base" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--card);padding:24px 26px;font-family:var(--font-ui);}
  .row{display:flex;align-items:flex-end;gap:16px;}
  .u{text-align:center;}
  .bar{background:var(--blue);border-radius:4px;width:26px;}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);margin-top:8px;}
  .n{font-weight:600;font-size:11px;color:var(--ink);}
</style></head><body>
  <div class="row">
    <div class="u"><div class="bar" style="height:4px"></div><div class="n">1</div><div class="v">4</div></div>
    <div class="u"><div class="bar" style="height:8px"></div><div class="n">2</div><div class="v">8</div></div>
    <div class="u"><div class="bar" style="height:12px"></div><div class="n">3</div><div class="v">12</div></div>
    <div class="u"><div class="bar" style="height:16px"></div><div class="n">4</div><div class="v">16</div></div>
    <div class="u"><div class="bar" style="height:24px"></div><div class="n">6</div><div class="v">24</div></div>
    <div class="u"><div class="bar" style="height:32px"></div><div class="n">8</div><div class="v">32</div></div>
    <div class="u"><div class="bar" style="height:44px"></div><div class="n">9</div><div class="v">44</div></div>
    <div class="u"><div class="bar" style="height:60px"></div><div class="n">10</div><div class="v">60</div></div>
    <div class="u"><div class="bar" style="height:80px"></div><div class="n">12</div><div class="v">80</div></div>
  </div>
</body></html>
