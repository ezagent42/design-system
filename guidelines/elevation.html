<!-- @dsCard group="Effects" viewport="700x190" name="Elevation · 招牌柔影" subtitle="Edge → raised → card. Edges made of light, not lines." -->
<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ground);padding:26px 28px;font-family:var(--font-ui);}
  .row{display:flex;gap:20px;}
  .e{flex:1;height:96px;background:var(--card);border-radius:var(--r-md);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;}
  .e1{box-shadow:var(--edge);}
  .e2{box-shadow:var(--shadow-sm);}
  .e3{box-shadow:var(--shadow-card);}
  .n{font-weight:600;font-size:13px;color:var(--ink);}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);}
</style></head><body>
  <div class="row">
    <div class="e e1"><span class="n">Edge · 描边</span><span class="v">0 0 0 1px / 4%</span></div>
    <div class="e e2"><span class="n">Raised · 浮起</span><span class="v">soft · 24px</span></div>
    <div class="e e3"><span class="n">Card · 招牌柔影</span><span class="v">layered · 60px</span></div>
  </div>
</body></html>
