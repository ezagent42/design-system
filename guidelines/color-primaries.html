<!-- @dsCard group="Colors" viewport="700x158" name="Primaries · 三原色为轴" subtitle="Logo De Stijl axis — 红 · 墨蓝 · 黄 · 翠" -->
<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--card);padding:24px 26px;font-family:var(--font-ui);}
  .row{display:flex;gap:14px;}
  .sw{flex:1;}
  .chip{height:70px;border-radius:var(--r-md);box-shadow:var(--edge);}
  .nm{font-weight:600;font-size:14px;color:var(--ink);margin-top:11px;}
  .nm small{font-weight:450;color:var(--ink-3);}
  .hx{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);margin-top:2px;letter-spacing:.02em;}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--red)"></div><div class="nm">红 <small>Red</small></div><div class="hx">#D81830</div></div>
    <div class="sw"><div class="chip" style="background:var(--blueink)"></div><div class="nm">墨蓝 <small>Ink Blue</small></div><div class="hx">#0048A8</div></div>
    <div class="sw"><div class="chip" style="background:var(--yellow)"></div><div class="nm">黄 <small>Yellow</small></div><div class="hx">#FFD400</div></div>
    <div class="sw"><div class="chip" style="background:var(--jade)"></div><div class="nm">翠 <small>Jade · success</small></div><div class="hx">#0FA06E</div></div>
  </div>
</body></html>
