<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AppIcon · soft 变体</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ground);font-family:var(--font-ui);padding:40px 36px 64px;}
  .wrap{max-width:1040px;margin:0 auto;}
  h1{font-family:var(--font-cn);font-weight:600;font-size:32px;color:var(--ink);margin:0;letter-spacing:.01em;}
  .lead{font-size:15px;color:var(--ink-2);margin:10px 0 0;max-width:66ch;line-height:1.6;}
  .lead b{color:var(--ink);font-weight:600;}
  .cols{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:30px;align-items:start;}
  .col{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow-card);padding:24px 22px 26px;}
  .colhead{display:flex;align-items:center;gap:9px;margin-bottom:4px;}
  .colhead h2{font-family:var(--font-ui);font-weight:700;font-size:17px;color:var(--ink);margin:0;}
  .pill{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border-radius:999px;}
  .pill.now{background:var(--ground-2);color:var(--ink-3);}
  .pill.pick{background:var(--jade-wash);color:var(--jade-deep);}
  .pill.weak{background:var(--orange-wash);color:#9A5410;}
  .csub{font-size:12.5px;color:var(--ink-3);margin:0 0 20px;line-height:1.5;min-height:50px;}
  .block{margin-top:20px;}
  .blabel{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin:0 0 12px;}
  .swatches{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  /* header mimic — pure white card, the problem context */
  .hdr{display:flex;align-items:center;gap:11px;padding:13px 15px;background:var(--card);border-radius:var(--r-md);box-shadow:var(--edge);}
  .hdr .slash{font-family:var(--font-mono);color:var(--ink-3);font-size:13px;}
  .hdr .t{font-family:var(--font-cn);font-weight:600;font-size:17px;color:var(--ink);}
  .hdr img{height:24px;}
  /* sidebar rows */
  .rows{display:flex;flex-direction:column;gap:2px;margin:0 -8px;}
  .agentrow{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:var(--r-md);}
  .agentrow.on{background:var(--blue-wash);}
  .agentrow .nm{font-weight:600;font-size:13.5px;color:var(--ink);}
  .agentrow .sb{font-size:11.5px;color:var(--ink-3);}
  .badge{margin-left:auto;}
  .note{margin-top:18px;padding:12px 14px;background:var(--ground-2);border-radius:var(--r-md);font-size:12.5px;line-height:1.55;color:var(--ink-2);}
  .note b{color:var(--ink);font-weight:600;}
  .verdict{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow-card);padding:24px 28px;margin-top:22px;}
  .verdict h3{font-family:var(--font-cn);font-weight:600;font-size:19px;color:var(--ink);margin:0 0 9px;}
  .verdict p{font-size:13.5px;color:var(--ink-2);line-height:1.65;margin:0;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
</head><body>
<div class="wrap">
  <h1>AppIcon · soft 变体</h1>
  <p class="lead">在<b>纯白 header</b> 和侧栏里对比三种外形。<b>soft</b> = 不透明的同色淡底（沿用 Badge 的 wash 语言）+ 深色品牌字形：在白底上对比足、不依赖背景、无白描边，和系统最和谐。</p>
  <div id="root"></div>
</div>
<script type="text/babel">
  const { AppIcon, Badge } = window.EzagentDesignSystem_b8e92c;
  const Tri  = () => <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 4l13 8-13 8z"/></svg>;
  const Dot  = () => <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="9"/></svg>;
  const Ring = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4"><circle cx="12" cy="12" r="8"/></svg>;
  const Sq   = () => <svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="3"/></svg>;
  const Bars = () => <svg viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="4" height="16" rx="2"/><rect x="10" y="4" width="4" height="16" rx="2" opacity=".55"/><rect x="16" y="4" width="4" height="16" rx="2"/></svg>;

  const AGENTS = [
    {name:'Research Agent', sub:'crawls + drafts briefs', color:'blue',   G:Tri,  s:['neutral','Draft']},
    {name:'Support Triage', sub:'routes tickets',          color:'red',    G:Dot,  s:['success','Live']},
    {name:'Sane Ledger',    sub:'books & reconciles',      color:'jade',   G:Ring, s:['neutral','Draft']},
    {name:'Data Analyst',   sub:'queries warehouse',       color:'orange', G:Bars, s:['success','Live']},
  ];

  const META = {
    solid: {h:'solid', pill:'now', tag:'Legacy', sub:'实色 squircle + 白字形。对比最强，但实色块在 header 里偏重，且和 Draft 徽章、文字争夺重量。'},
    soft:  {h:'soft',  pill:'pick', tag:'推荐 ✦', sub:'同色不透明淡底 + 深色品牌字形。不依赖背景、白底成立、边界靠淡色与柔影 —— 与系统的 Badge/卡片同源。'},
    glass: {h:'glass', pill:'weak', tag:'仅限色彩之上', sub:'白底上模糊无物可模糊，退化成淡蓝平涂 + 白描边，对比最低、像播放按钮。它的主场是 hero / 预览的色块舞台。'},
  };

  function Side({mode}) {
    const m = META[mode];
    return (
      <div className="col">
        <div className="colhead"><h2>{m.h}</h2><span className={'pill '+m.pill}>{m.tag}</span></div>
        <p className="csub">{m.sub}</p>

        <div className="block">
          <p className="blabel">标题栏 · header（白底）</p>
          <div className="hdr">
            <img src="../assets/ezagent-logo.png" alt="Ezagent"/>
            <span className="slash">/</span>
            <AppIcon color="blue" size="sm" variant={mode} glyph={<Tri/>}/>
            <span className="t">Research Agent</span>
            <span style={{marginLeft:'auto'}}><Badge tone="neutral">Draft</Badge></span>
          </div>
        </div>

        <div className="block">
          <p className="blabel">侧栏列表 · sidebar</p>
          <div className="rows">
            {AGENTS.map((a,i)=>(
              <div key={i} className={'agentrow'+(i===0?' on':'')}>
                <AppIcon color={a.color} size="sm" variant={mode} glyph={<a.G/>}/>
                <div style={{minWidth:0}}>
                  <div className="nm">{a.name}</div>
                  <div className="sb">{a.sub}</div>
                </div>
                <span className="badge"><Badge tone={a.s[0]} dot>{a.s[1]}</Badge></span>
              </div>
            ))}
          </div>
        </div>

        <div className="block">
          <p className="blabel">调色板 · palette</p>
          <div className="swatches">
            <AppIcon color="blue" size="md" variant={mode} glyph={<Tri/>}/>
            <AppIcon color="red" size="md" variant={mode} glyph={<Dot/>}/>
            <AppIcon color="yellow" size="md" variant={mode} glyph={<Ring/>}/>
            <AppIcon color="jade" size="md" variant={mode} glyph={<Sq/>}/>
            <AppIcon color="orange" size="md" variant={mode} glyph={<Bars/>}/>
          </div>
        </div>
      </div>
    );
  }

  function App(){
    return (<>
      <div className="cols">
        <Side mode="solid"/>
        <Side mode="soft"/>
        <Side mode="glass"/>
      </div>
      <div className="verdict">
        <h3>建议</h3>
        <p><b>soft</b> 在白底场景（header、侧栏、卡片内）最和谐，建议设为这些场景的默认；<b>glass</b> 保留给漂浮在色块/图像之上的 hero、预览舞台；<b>solid</b> 在需要最强存在感时备用。要我把 <span className="ez-mono">AppIcon</span> 默认改成 <span className="ez-mono">soft</span>，并按场景在两个 UI kit 里就位（深色舞台用 glass）吗？</p>
      </div>
    </>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
