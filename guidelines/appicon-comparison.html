<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AppIcon · 外形对比</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ground);font-family:var(--font-ui);padding:40px 36px 64px;}
  .wrap{max-width:1080px;margin:0 auto;}
  h1{font-family:var(--font-cn);font-weight:600;font-size:34px;color:var(--ink);margin:0;letter-spacing:.01em;}
  .lead{font-size:16px;color:var(--ink-2);margin:10px 0 0;max-width:64ch;line-height:1.6;}
  .cols{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:32px;align-items:start;}
  .col{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow-card);padding:24px 22px 28px;}
  .pill.glass{background:var(--jade-wash);color:var(--jade-deep);}
  .colhead{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .colhead h2{font-family:var(--font-ui);font-weight:700;font-size:18px;color:var(--ink);margin:0;}
  .pill{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:4px 9px;border-radius:999px;}
  .pill.now{background:var(--ground-2);color:var(--ink-3);}
  .pill.new{background:var(--blue-wash);color:var(--blue-deep);}
  .csub{font-size:13px;color:var(--ink-3);margin:0 0 22px;line-height:1.5;}
  .block{margin-top:22px;}
  .blabel{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin:0 0 13px;}
  .swatches{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
  /* sidebar row mimic */
  .rows{display:flex;flex-direction:column;gap:2px;margin:0 -8px;}
  .agentrow{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:var(--r-md);}
  .agentrow.on{background:var(--blue-wash);}
  .agentrow .nm{font-weight:600;font-size:14px;color:var(--ink);}
  .agentrow .sb{font-size:12px;color:var(--ink-3);}
  .badge{margin-left:auto;}
  /* bare glyph */
  .bare{display:inline-flex;align-items:center;justify-content:center;flex:none;}
  .bare.sm{width:32px;height:32px;}
  .bare.sm svg{width:30px;height:30px;}
  .bare.md svg{width:44px;height:44px;}
  .bare.lg svg{width:60px;height:60px;}
  /* glass-backed icon */
  .gi{display:inline-flex;align-items:center;justify-content:center;flex:none;position:relative;
    backdrop-filter:blur(10px) saturate(1.4);-webkit-backdrop-filter:blur(10px) saturate(1.4);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.7), 0 6px 16px -8px rgba(15,15,15,.3);}
  .gi.sm{width:34px;height:34px;border-radius:11px;}
  .gi.sm svg{width:19px;height:19px;}
  .gi.md{width:54px;height:54px;border-radius:16px;}
  .gi.md svg{width:28px;height:28px;}
  .gi.lg{width:74px;height:74px;border-radius:21px;}
  .gi.lg svg{width:38px;height:38px;}
  .note{display:flex;gap:10px;align-items:flex-start;margin-top:18px;padding:13px 15px;background:var(--ground-2);border-radius:var(--r-md);font-size:13px;line-height:1.55;color:var(--ink-2);}
  .note b{color:var(--ink);font-weight:600;}
  .verdict{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow-card);padding:26px 30px;margin-top:24px;}
  .verdict h3{font-family:var(--font-cn);font-weight:600;font-size:20px;color:var(--ink);margin:0 0 10px;}
  .verdict p{font-size:14px;color:var(--ink-2);line-height:1.65;margin:0;}
  .toolbar{display:flex;gap:10px;align-items:center;margin-top:10px;padding:10px 14px;background:var(--ground-2);border-radius:var(--r-md);}
  /* tinted stage so glass has something to frost over */
  .gstage{position:relative;border-radius:var(--r-md);overflow:hidden;}
  .gstage .blob{position:absolute;border-radius:999px;filter:blur(8px);opacity:.5;}
  .toolbar .t{font-family:var(--font-cn);font-weight:600;font-size:16px;color:var(--ink);}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
</head><body>
<div class="wrap">
  <h1>AppIcon · 外形对比</h1>
  <p class="lead">三种 AppIcon 外形并排对比：<b>圆角方形外壳</b>（当前，实色 squircle）· <b>直接显示 Icon</b>（去壳，仅字形）· <b>毛玻璃托底</b>（字形 + 同色半透明毛玻璃方块）。下方在真实场景（侧栏、标题、调色板、尺寸）中比较。</p>
  <div id="root"></div>
</div>
<script type="text/babel">
  const { AppIcon, Badge } = window.EzagentDesignSystem_b8e92c;

  // monochrome geometric glyphs (same as the system set)
  const Tri  = ({c}) => <svg viewBox="0 0 24 24" fill={c||'currentColor'}><path d="M7 4l13 8-13 8z"/></svg>;
  const Dot  = ({c}) => <svg viewBox="0 0 24 24" fill={c||'currentColor'}><circle cx="12" cy="12" r="9"/></svg>;
  const Ring = ({c}) => <svg viewBox="0 0 24 24" fill="none" stroke={c||'currentColor'} strokeWidth="4"><circle cx="12" cy="12" r="8"/></svg>;
  const Sq   = ({c}) => <svg viewBox="0 0 24 24" fill={c||'currentColor'}><rect x="5" y="5" width="14" height="14" rx="3"/></svg>;
  const Bars = ({c}) => <svg viewBox="0 0 24 24" fill={c||'currentColor'}><rect x="4" y="4" width="4" height="16" rx="2"/><rect x="10" y="4" width="4" height="16" rx="2" opacity=".55"/><rect x="16" y="4" width="4" height="16" rx="2"/></svg>;

  const V = {red:'var(--red)', blue:'var(--blue)', blueink:'var(--blueink)', yellow:'#E0B400', jade:'var(--jade)', orange:'var(--orange)'};
  const AGENTS = [
    {name:'Research Agent', sub:'crawls + drafts briefs', color:'blue',    G:Tri,  status:['success','Live']},
    {name:'Support Triage', sub:'routes tickets',          color:'red',     G:Dot,  status:['success','Live']},
    {name:'Sane Ledger',    sub:'books & reconciles',      color:'jade',    G:Ring, status:['neutral','Draft']},
    {name:'Ops Watcher',    sub:'monitors deploys',        color:'blueink', G:Sq,   status:['warning','Paused']},
    {name:'Data Analyst',   sub:'queries warehouse',       color:'orange',  G:Bars, status:['neutral','Draft']},
  ];

  // tint background for glass-backed icons (brand color, low alpha)
  const TINT = {red:'rgba(216,24,48,.14)', blue:'rgba(11,92,255,.14)', blueink:'rgba(0,72,168,.14)', yellow:'rgba(224,180,0,.18)', jade:'rgba(15,160,110,.15)', orange:'rgba(255,138,30,.16)'};

  // one icon, rendered per mode
  function Icon({G, color, size, mode}) {
    if (mode === 'squircle') return <AppIcon color={color} size={size} glyph={<G/>} />;
    if (mode === 'bare') return <span className={'bare '+size}><G c={V[color]} /></span>;
    // glass
    return <span className={'gi '+size} style={{background:TINT[color]}}><G c={V[color]} /></span>;
  }

  const META = {
    squircle: {h:'圆角方形外壳', pill:'now', tag:'Current', sub:'AppIcon — 实色 squircle 底，白色（黄底为墨色）单色字形。',
      note:<span><b>取舍：</b>识别度高、成体系，任何字形都有稳定底色与对比；但更重，实色块会与卡片、徽章争夺视觉重量。</span>},
    bare: {h:'直接显示 Icon', pill:'new', tag:'Bare', sub:'字形即图标，品牌色直接作用于线条/形状，无背景容器。',
      note:<span><b>取舍：</b>最轻、最通透，icon 本体最醒目；但失去容器识别度，浅色字形在白卡上对比偏低。</span>},
    glass: {h:'毛玻璃托底 Icon', pill:'glass', tag:'Glass ✦', sub:'品牌色字形 + 同色低透明毛玻璃方块：保留 icon 本体，又给回一点容器与对比。',
      note:<span><b>取舍：</b>兼顾两者 — icon 仍是主角，毛玻璃提供轻盈的容器、统一识别度与稳定对比，呼应系统的 GlassPanel 语言。</span>},
  };

  function Side({mode}) {
    const m = META[mode];
    return (
      <div className="col">
        <div className="colhead">
          <h2>{m.h}</h2>
          <span className={'pill '+m.pill}>{m.tag}</span>
        </div>
        <p className="csub">{m.sub}</p>

        <div className="block">
          <p className="blabel">尺寸 · sizes</p>
          <div className="swatches">
            <Icon G={Tri} color="blue" size="lg" mode={mode}/>
            <Icon G={Tri} color="blue" size="md" mode={mode}/>
            <Icon G={Tri} color="blue" size="sm" mode={mode}/>
          </div>
        </div>

        <div className="block">
          <p className="blabel">调色板 · palette</p>
          <div className="swatches">
            {AGENTS.map((a,i)=> <Icon key={i} G={a.G} color={a.color} size="md" mode={mode}/>)}
          </div>
        </div>

        <div className="block">
          <p className="blabel">侧栏列表 · sidebar rows</p>
          <div className="rows">
            {AGENTS.slice(0,4).map((a,i)=>(
              <div key={i} className={'agentrow'+(i===0?' on':'')}>
                <Icon G={a.G} color={a.color} size="sm" mode={mode}/>
                <div style={{minWidth:0}}>
                  <div className="nm">{a.name}</div>
                  <div className="sb">{a.sub}</div>
                </div>
                <span className="badge"><Badge tone={a.status[0]} dot>{a.status[1]}</Badge></span>
              </div>
            ))}
          </div>
        </div>

        <div className="block">
          <p className="blabel">标题栏 · header</p>
          <div className="toolbar">
            <Icon G={Tri} color="blue" size="sm" mode={mode}/>
            <span className="t">Research Agent</span>
            <span style={{marginLeft:'auto'}}><Badge tone="success" dot>Live</Badge></span>
          </div>
        </div>

        <div className="note">{m.note}</div>
      </div>
    );
  }

  function App(){
    return (<>
      <div className="cols">
        <Side mode="squircle"/>
        <Side mode="bare"/>
        <Side mode="glass"/>
      </div>
      <div className="verdict">
        <h3>建议</h3>
        <p><b>毛玻璃托底</b>是三者里最贴合本系统语言的折中：icon 本体仍是主角，但同色低透明的毛玻璃方块（呼应 <span class="ez-mono">GlassPanel</span>）给回了轻盈的容器、统一识别度和稳定对比，浅色字形也不再发飘。若采纳，我会给 <span class="ez-mono">AppIcon</span> 增加 <span class="ez-mono">variant="solid|glass|bare"</span>（默认改为 <span class="ez-mono">glass</span>），并把两个 UI kit（Console + Builder）全量切换过去。告诉我选哪版即可。</p>
      </div>
    </>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
