<!-- @dsCard group="Brand" viewport="700x190" name="Logo · 标志" subtitle="Isometric tri-color cube — De Stijl primaries" -->
<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--card);padding:24px 28px;font-family:var(--font-ui);display:flex;gap:28px;align-items:center;}
  .markwrap{display:inline-flex;align-items:center;gap:16px;}
  .mark{height:84px;width:auto;display:block;}
  .wd{font-family:var(--font-ui);font-weight:800;font-size:26px;letter-spacing:-.02em;color:var(--ink);}
  .wd small{display:block;font-family:var(--font-cn-ui);font-weight:400;font-size:13px;letter-spacing:.02em;color:var(--ink-3);margin-top:3px;}
  .rule{width:1px;align-self:stretch;background:var(--line);}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);line-height:1.9;}
</style></head><body>
  <div class="markwrap">
    <img class="mark" src="../assets/ezagent-logo.png" alt="Ezagent">
    <span class="wd">EZAGENT<small>Organization IDE</small></span>
  </div>
  <div class="rule"></div>
  <div class="meta">red · ink-blue · yellow<br>clear space ≥ 0.5× mark<br>min height 24px</div>
</body></html>
