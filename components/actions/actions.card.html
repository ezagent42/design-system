<!-- @dsCard group="Components" viewport="700x250" name="Actions · Button & IconButton" subtitle="Pill buttons + icon buttons across variants, sizes & states" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--card);padding:28px 30px;font-family:var(--font-ui);}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin:0 0 12px;}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:24px;}
  .row:last-child{margin-bottom:0;}
  svg.lucide{width:18px;height:18px;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head><body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton } = window.EzagentDesignSystem_b8e92c;
  const I = ({n}) => <i data-lucide={n}></i>;
  function Demo(){
    return (<>
      <p className="lbl">Button · variants</p>
      <div className="row">
        <Button variant="primary" iconRight={<I n="arrow-right"/>}>开始使用 · Get started</Button>
        <Button variant="secondary">查看组件</Button>
        <Button variant="ghost">Cancel</Button>
        <Button variant="danger" iconLeft={<I n="trash-2"/>}>Delete</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </div>
      <p className="lbl">Button · sizes</p>
      <div className="row">
        <Button variant="primary" size="sm">Small</Button>
        <Button variant="primary" size="md">Medium</Button>
        <Button variant="primary" size="lg">Large</Button>
      </div>
      <p className="lbl">IconButton</p>
      <div className="row">
        <IconButton label="Search"><I n="search"/></IconButton>
        <IconButton variant="solid" label="Play"><I n="play"/></IconButton>
        <IconButton variant="accent" label="New"><I n="plus"/></IconButton>
        <IconButton label="More"><I n="more-horizontal"/></IconButton>
      </div>
    </>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(()=>window.lucide && window.lucide.createIcons(), 60);
</script>
</body></html>
