<!-- @dsCard group="Components" viewport="700x360" name="Surfaces · AppIcon · GlassPanel · ColorPoints" subtitle="Glass-backed icons, frosted glass over color, 点彩 texture" -->
<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--card);padding:28px 30px;font-family:var(--font-ui);}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin:0 0 14px;}
  .row{display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin-bottom:26px;}
  .row:last-child{margin-bottom:0;}
  .stage{position:relative;border-radius:16px;overflow:hidden;padding:24px 22px;background:#14131C;display:flex;align-items:center;gap:14px;flex-wrap:wrap;width:100%;box-sizing:border-box;}
  .blob{position:absolute;border-radius:999px;filter:blur(3px);pointer-events:none;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head><body>
<div id="root"></div>
<script type="text/babel">
  const { AppIcon, GlassPanel, ColorPoints, SegmentedControl } = window.EzagentDesignSystem_b8e92c;
  // monochrome geometric glyphs
  const Tri  = () => <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 4l13 8-13 8z"/></svg>;
  const Dot  = () => <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="9"/></svg>;
  const Ring = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4"><circle cx="12" cy="12" r="8"/></svg>;
  const Chk  = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.4" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>;
  const Sq   = () => <svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="3"/></svg>;
  const Bars = () => <svg viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="4" height="16" rx="2"/><rect x="10" y="4" width="4" height="16" rx="2" opacity=".6"/><rect x="16" y="4" width="4" height="16" rx="2"/></svg>;
  function Demo(){
    return (<>
      <p className="lbl">AppIcon · glass (default)</p>
      <div className="row">
        <AppIcon color="blue" glyph={<Tri/>} />
        <AppIcon color="red" glyph={<Dot/>} badge={1} />
        <AppIcon color="yellow" glyph={<Ring/>} />
        <AppIcon color="jade" glyph={<Chk/>} />
        <AppIcon color="blueink" glyph={<Sq/>} />
        <AppIcon color="orange" glyph={<Bars/>} />
        <AppIcon color="ink" glyph={<Tri/>} badge="✓" />
      </div>
      <p className="lbl">variant · glass / solid / bare</p>
      <div className="row">
        <AppIcon color="blue" variant="glass" glyph={<Tri/>} />
        <AppIcon color="blue" variant="solid" glyph={<Tri/>} />
        <AppIcon color="blue" variant="bare" glyph={<Tri/>} />
        <span style={{width:18}}></span>
        <AppIcon color="jade" variant="glass" glyph={<Chk/>} />
        <AppIcon color="jade" variant="solid" glyph={<Chk/>} />
        <AppIcon color="jade" variant="bare" glyph={<Chk/>} />
      </div>
      <p className="lbl">GlassPanel · 毛玻璃 over color</p>
      <div className="row">
        <div className="stage">
          <span className="blob" style={{width:120,height:120,background:'var(--red)',left:-24,top:-34}}></span>
          <span className="blob" style={{width:96,height:96,background:'var(--yellow)',left:170,bottom:-44}}></span>
          <span className="blob" style={{width:110,height:110,background:'var(--blueink)',left:'46%',top:-40}}></span>
          <span className="blob" style={{width:84,height:84,background:'var(--jade)',right:120,bottom:-30}}></span>
          <GlassPanel tone="dark" style={{padding:4,borderRadius:999,position:'relative',zIndex:2}}>
            <SegmentedControl options={['设计','开发','预览']} value="设计" onChange={()=>{}} />
          </GlassPanel>
          <GlassPanel chip soft style={{marginLeft:'auto',position:'relative',zIndex:2,color:'#16161C'}}>backdrop-blur(13px)</GlassPanel>
        </div>
      </div>
      <p className="lbl">ColorPoints · 点彩</p>
      <ColorPoints count={36} height={110} seed={5} />
    </>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
