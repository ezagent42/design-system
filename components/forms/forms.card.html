<!-- @dsCard group="Components" viewport="700x340" name="Forms · Input · Select · Toggle · Check · Radio · Segmented" subtitle="Field controls on sunken surfaces; cobalt focus & fills" -->
<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--card);padding:28px 30px;font-family:var(--font-ui);}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin:0 0 12px;}
  .row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:24px;}
  .row:last-child{margin-bottom:0;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head><body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Select, Toggle, Checkbox, Radio, SegmentedControl } = window.EzagentDesignSystem_b8e92c;
  const { useState } = React;
  function Demo(){
    const [tab,setTab]=useState('设计');
    const [on,setOn]=useState(true);
    const [chk,setChk]=useState(true);
    const [plan,setPlan]=useState('pro');
    return (<>
      <div className="row">
        <Input label="项目名称 · Project" placeholder="Untitled agent" iconLeft={<i data-lucide="folder"></i>} />
        <Select label="Model" options={['Claude','GPT-4o','Llama 3']} />
      </div>
      <p className="lbl">Segmented · 设计 / 开发 / 预览</p>
      <div className="row">
        <SegmentedControl options={['设计','开发','预览']} value={tab} onChange={setTab} />
      </div>
      <p className="lbl">Toggle · Checkbox · Radio</p>
      <div className="row">
        <Toggle checked={on} onChange={setOn} label="Auto-run" />
        <Checkbox checked={chk} onChange={setChk} label="Remember me" />
        <Radio name="plan" value="pro" checked={plan==='pro'} onChange={setPlan} label="Pro" />
        <Radio name="plan" value="team" checked={plan==='team'} onChange={setPlan} label="Team" />
      </div>
    </>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(()=>window.lucide && window.lucide.createIcons(), 60);
</script>
</body></html>
