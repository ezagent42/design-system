<!-- @dsCard group="Slides" viewport="1280x720" name="Section slide" subtitle="De Stijl solid color block, big index + title" -->
<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;width:1280px;height:720px;background:var(--ground);font-family:var(--font-ui);overflow:hidden;position:relative;}
  .slide{position:absolute;inset:48px;background:var(--blue);border-radius:var(--r-lg);box-shadow:var(--shadow-card);
    padding:72px 80px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;color:#fff;}
  .idx{font-family:var(--font-mono);font-weight:700;font-size:22px;letter-spacing:.1em;color:rgba(255,255,255,.7);}
  h2{font-family:var(--font-cn);font-weight:600;font-size:92px;line-height:1.08;letter-spacing:.01em;margin:0;max-width:18ch;}
  .en{font-family:var(--font-ui);font-weight:600;font-size:26px;color:rgba(255,255,255,.8);margin-top:20px;letter-spacing:-.01em;}
  .foot{display:flex;align-items:center;gap:12px;}
  .foot .dot{width:12px;height:12px;border-radius:999px;}
  .foot .label{font-family:var(--font-mono);font-size:14px;color:rgba(255,255,255,.8);letter-spacing:.04em;}
  .chips{position:absolute;right:80px;top:72px;display:flex;gap:12px;}
  .chips i{width:30px;height:30px;border-radius:9px;display:block;}
</style></head><body>
<div class="slide">
  <div class="chips"><i style="background:var(--red)"></i><i style="background:var(--yellow)"></i><i style="background:var(--jade)"></i></div>
  <div class="idx">01 — FOUNDATIONS</div>
  <div>
    <h2>视觉<br>基础。</h2>
    <div class="en">Visual foundations · color, type, form</div>
  </div>
  <div class="foot">
    <span class="dot" style="background:#fff"></span>
    <span class="label">EZAGENT · DESIGN SYSTEM</span>
  </div>
</div>
</body></html>
