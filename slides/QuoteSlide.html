<!-- @dsCard group="Slides" viewport="1280x720" name="Quote slide" subtitle="Large CN serif pull quote with attribution" -->
<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;width:1280px;height:720px;background:var(--ground);font-family:var(--font-ui);overflow:hidden;position:relative;}
  .slide{position:absolute;inset:48px;background:#14131C;border-radius:var(--r-lg);box-shadow:var(--shadow-card);
    padding:80px 90px;display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
  .dots{position:absolute;inset:0;}
  .dots i{position:absolute;border-radius:999px;}
  .mark{font-family:var(--font-cn);font-weight:600;font-size:120px;line-height:.7;color:var(--blue);position:relative;z-index:2;}
  blockquote{position:relative;z-index:2;font-family:var(--font-cn);font-weight:600;font-size:58px;line-height:1.32;letter-spacing:.01em;
    color:#fff;margin:8px 0 0;max-width:20ch;}
  blockquote em{font-style:normal;color:var(--yellow);}
  .by{position:relative;z-index:2;display:flex;align-items:center;gap:14px;margin-top:40px;}
  .by .av{width:48px;height:48px;border-radius:999px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;}
  .by .t b{display:block;color:#fff;font-size:18px;font-weight:600;}
  .by .t span{font-family:var(--font-mono);font-size:13px;color:rgba(255,255,255,.6);}
</style></head><body>
<div class="slide">
  <div class="dots" id="d"></div>
  <div class="mark">“</div>
  <blockquote>把整个组织，装进一个 <em>IDE</em>。</blockquote>
  <div class="by">
    <span class="av">A</span>
    <div class="t"><b>Allen Woods</b><span>Founder · Ezagent</span></div>
  </div>
</div>
<script>
  var lum=['#D81830','#0048A8','#FFD400','#0FA06E','#0B5CFF','#FF8A1E'];
  var f=document.getElementById('d');
  for(var i=0;i<26;i++){var s=6+Math.random()*16,c=lum[(Math.random()*lum.length)|0],e=document.createElement('i');
    e.style.cssText='left:'+(Math.random()*94+2)+'%;top:'+(Math.random()*88+4)+'%;width:'+s+'px;height:'+s+'px;background:'+c+';opacity:'+(0.3+Math.random()*0.28).toFixed(2)+';';f.appendChild(e);}
</script>
</body></html>
