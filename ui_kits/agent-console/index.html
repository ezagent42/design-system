<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ezagent · Agent Console</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{height:100%;}
  body{margin:0;background:var(--ground);font-family:var(--font-ui);overflow:hidden;}
  #app{position:fixed;inset:0;}
  .ez-shell{position:absolute;inset:0;display:flex;gap:16px;padding:16px;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head><body>
<div id="app"></div>
<script type="text/babel" src="Login.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Workspace.jsx"></script>
<script type="text/babel">
  const { useState, useEffect } = React;
  function App() {
    const [authed, setAuthed] = useState(false);
    const [activeId, setActiveId] = useState('research');
    useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
    const agents = window.EZ_AGENTS;
    const agent = agents.find((a) => a.id === activeId) || agents[0];
    if (!authed) return <window.EzLogin onContinue={() => setAuthed(true)} />;
    return (
      <div className="ez-shell">
        <window.EzSidebar activeId={activeId} onSelect={setActiveId} />
        <window.EzWorkspace agent={agent} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 120);
</script>
<!-- impeccable-live-start -->
<script src="http://localhost:8400/live.js"></script>
<!-- impeccable-live-end -->
</body></html>
